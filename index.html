<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pibble Hackclub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <h1 class="title">Pibble Scanner</h1>
        <p class="subtitle">Discover your true inner Pibble!!!</p>
        <p class="subtitle">Zip zip zip zap zap zap zup zup</p>

        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            </div class="scan-bar"></div>
    </div>

    <button id="snap">REVEAL MY PIBBLE NOOW</button>

    <div id="result-container" class="hidden">
        <div class="divider"></div>
        <h2 id="pibble-name"></h2>
        <div class="image-frame">
            <img src="" id="pibble-img"> 
        </div>
    </div>
    <canvas id="canvas" style="display: none;"></canvas>
    <script src="script.js"></script>
</body>
</html>
